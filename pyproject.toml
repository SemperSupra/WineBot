[tool.ruff]
# ── WineBot Ruff Configuration ─────────────────────────────────────────────
# Explicit ruleset — not using defaults. Enables rules that catch real issues
# without overwhelming with pedantic formatting rules.
# See: https://docs.astral.sh/ruff/rules/

line-length = 100
target-version = "py312"

# File exclusions (generated, vendored, or extracted, path-reference files)
exclude = [
    ".git",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
    ".eggs",
    # Path reference files (single-line module paths, not real Python)
    "automation/diagnose_vnc_client.py",
    "automation/find_and_click.py",
    "automation/input_trace_core.py",
    "automation/notepad_create_and_verify.py",
    "automation/vnc_input_proxy.py",
    "automation/wait_for_pixel_stability.py",
    "scripts/analyze-trace-latency.py",
    "scripts/verify-screenshot-metadata.py",
]

[tool.ruff.lint]
# Select rulesets by category:
#   E/W — pycodestyle errors/warnings
#   F   — pyflakes (logic bugs, undefined names)
#   I   — isort (import ordering)
#   N   — pep8-naming
#   D   — pydocstyle (docstring conventions)
#   UP  — pyupgrade (modern Python idioms)
#   B   — bugbear (common bugs)
#   SIM — simplify (redundant code)
#   ARG — unused arguments
#   PTH — pathlib (path handling)
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes (undefined names, unused imports)
    "I",    # isort (import ordering)
    "UP",   # pyupgrade (modern Python features)
    "B",    # bugbear (potential bugs)
    "SIM",  # simplify (redundant code patterns)
    "ARG",  # unused function arguments
]

# Rules to explicitly ignore
ignore = [
    "E501",    # line too long (handled by formatter)
    "E731",    # lambda assignment (acceptable in some contexts)
    "B904",    # raise-without-from-inside-except (needs careful per-case review)
    "B905",    # zip() without strict=True (many existing uses)
    "UP031",   # printf-string-formatting (many existing uses)
    "UP042",   # replace-str-enum (false positives in our usage)
    "SIM102",  # collapsible-if (readability preference)
    "SIM114",  # if-with-same-arms (readability preference)
    "SIM115",  # open-file-with-context-handler (legacy patterns)
    "SIM116",  # if-else-block-instead-of-dict-lookup (readability)
    "SIM212",  # if-expr-with-twisted-arms (readability preference)
]

[tool.ruff.lint.per-file-ignores]
# Tests can use bare asserts and have more lenient naming
"tests/**" = ["D", "N", "ARG", "SIM117"]
"scripts/**" = ["D"]  # scripts don't need full docstrings
# Diagnostic/research scripts are exercised manually and often preserve compact
# benchmark code from experiments. Keep release lint focused on product paths.
"scripts/diagnostics/**" = ["D", "ARG", "E701", "E702", "F401", "F402", "F841", "B007", "SIM105", "SIM108", "SIM117"]
"scripts/winebot-gt-generator.py" = ["ARG", "E701", "F402", "B007", "SIM108"]
# FastAPI route files: Body() in defaults is the standard FastAPI pattern
"api/routers/*.py" = ["B008"]
# Legacy diagnostics: large monolithic files with cross-referencing patterns
"scripts/diagnostics/ui_detectors.py" = ["F821", "ARG002"]
"scripts/diagnostics/cv-element-detect.py" = ["ARG002"]
"scripts/diagnostics/cv-omni-analyze.py" = ["ARG002"]
"scripts/diagnostics/workflow_evaluator.py" = ["ARG002"]

[tool.ruff.format]
# Use consistent formatting
quote-style = "double"
indent-style = "space"
line-ending = "auto"


[tool.mypy]
# ── WineBot Mypy Configuration ──────────────────────────────────────────────
python_version = 3.12
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
disallow_any_unimported = false
disallow_untyped_defs = false
ignore_missing_imports = true
no_implicit_optional = true
check_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
