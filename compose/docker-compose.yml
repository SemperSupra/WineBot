x-winebot-env: &winebot_env
  WINEPREFIX: /wineprefix
  DISPLAY: :99
  SCREEN: 1280x720x24
  APP_EXE: ${APP_EXE:-}
  APP_ARGS: ${APP_ARGS:-}
  WORKDIR: ${WORKDIR:-}
  APP_NAME: ${APP_NAME:-}
  INIT_PREFIX: ${INIT_PREFIX:-1}
  WINEARCH: ${WINEARCH:-win64}
  RUN_AUTOMATION: ${RUN_AUTOMATION:-0}
  AUTOMATION_CMD: ${AUTOMATION_CMD:-}
  WINEBOT_RECORD: ${WINEBOT_RECORD:-0}
  WINEBOT_INPUT_TRACE: ${WINEBOT_INPUT_TRACE:-1}
  WINEBOT_INPUT_TRACE_WINDOWS: ${WINEBOT_INPUT_TRACE_WINDOWS:-1}
  WINEBOT_INPUT_TRACE_RECORD: ${WINEBOT_INPUT_TRACE_RECORD:-0}
  WINEBOT_INPUT_TRACE_NETWORK: ${WINEBOT_INPUT_TRACE_NETWORK:-0}
  WINEBOT_INPUT_TRACE_NETWORK_SAMPLE_MS: ${WINEBOT_INPUT_TRACE_NETWORK_SAMPLE_MS:-10}
  WINEBOT_USER_DIR: ${WINEBOT_USER_DIR:-}
  API_TOKEN: ${API_TOKEN:-}
  ENABLE_WINEDBG: ${ENABLE_WINEDBG:-0}
  ENABLE_API: ${ENABLE_API:-1}
  WINEDBG_MODE: ${WINEDBG_MODE:-}
  WINEDBG_PORT: ${WINEDBG_PORT:-}
  WINEDBG_NO_START: ${WINEDBG_NO_START:-}
  WINEDBG_COMMAND: ${WINEDBG_COMMAND:-}
  WINEDBG_SCRIPT: ${WINEDBG_SCRIPT:-}
  ENABLE_VNC: ${ENABLE_VNC:-}
  VNC_PORT: ${VNC_PORT:-5900}
  NOVNC_PORT: ${NOVNC_PORT:-6080}
  NOVNC_HOST: ${NOVNC_HOST:-}
  NOVNC_TITLE: ${NOVNC_TITLE:-}
  VNC_PASSWORD: ${VNC_PASSWORD:-}
  VNC_BIND: ${VNC_BIND:-}
  BUILD_INTENT: ${BUILD_INTENT:-rel}
  WINEBOT_SUPPORT_MODE: ${WINEBOT_SUPPORT_MODE:-0}
  WINEBOT_SUPPORT_MODE_MINUTES: ${WINEBOT_SUPPORT_MODE_MINUTES:-60}
  WINEBOT_ALLOW_HEADLESS_HYBRID: ${WINEBOT_ALLOW_HEADLESS_HYBRID:-0}
  WINEBOT_INPUT_KEY_BACKEND: ${WINEBOT_INPUT_KEY_BACKEND:-ahk}
  WINEBOT_INPUT_SELF_TEST: ${WINEBOT_INPUT_SELF_TEST:-0}
  WINE_DPI: ${WINE_DPI:-96}
  WINE_KEYBOARD_LAYOUT: ${WINE_KEYBOARD_LAYOUT:-00000409}
  WINE_FONT_SMOOTHING: ${WINE_FONT_SMOOTHING:-grayscale}
  WINE_FORCE_FOCUS: ${WINE_FORCE_FOCUS:-0}
  WINE_WINETRICKS: ${WINE_WINETRICKS:-}
  WINE_INSTALL_MS_FONTS: ${WINE_INSTALL_MS_FONTS:-0}
  WINEBOT_LOADOUT: ${WINEBOT_LOADOUT:-}
  WINEBOT_CV_MODEL: ${WINEBOT_CV_MODEL:-none}
  WINEDEBUG: ${WINEDEBUG:-}

x-winebot-base: &winebot_base
  build:
    context: ..
    dockerfile: docker/Dockerfile
    target: intent-${BUILD_INTENT:-rel}
    args:
      BASE_IMAGE: ${BASE_IMAGE:-ghcr.io/sempersupra/winebot-base:base-2026-05-04}
      VCS_REF: ${VCS_REF:-local}
      BUILD_DATE: ${BUILD_DATE:-local}
      SOURCE_REPO: ${SOURCE_REPO:-https://github.com/sempersupra/winebot}
      BUILD_INTENT: ${BUILD_INTENT:-rel}
  image: winebot:${WINEBOT_IMAGE_VERSION:-local}-${BUILD_INTENT:-rel}
  volumes:
    - ${WINEPREFIX_VOL:-wineprefix}:/wineprefix
    - winebot-shared:/winebot-shared
    - ../apps:/apps:ro
    - ../automation/assets:/automation/assets:ro
    - ../artifacts:/artifacts

services:
  winebot:
    <<: *winebot_base
    profiles:
      - headless
    environment:
      <<: *winebot_env
      MODE: headless
      WINEBOT_INSTANCE_CONTROL_MODE: ${WINEBOT_INSTANCE_CONTROL_MODE:-agent-only}
      WINEBOT_SESSION_CONTROL_MODE: ${WINEBOT_SESSION_CONTROL_MODE:-agent-only}
      WINEBOT_ALLOW_HEADLESS_HYBRID: ${WINEBOT_ALLOW_HEADLESS_HYBRID:-0}
      # When set to 0, prevents the desktop supervisor from restarting
      # explorer.exe. Required for headless automation that targets
      # individual app X11 windows via xdotool or VNC key events.
      WINEBOT_SUPERVISE_EXPLORER: ${WINEBOT_SUPERVISE_EXPLORER:-1}
    ports: []
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "TOKENS=\"$$(cat /tmp/winebot_api_token 2>/dev/null || true) $$(cat /winebot-shared/winebot_api_token 2>/dev/null || true)\"; for TOKEN in $$TOKENS; do [ -z \"$$TOKEN\" ] && continue; curl -fsS -H \"X-API-Key: $$TOKEN\" http://localhost:8000/health >/dev/null && exit 0; done; curl -fsS http://localhost:8000/health >/dev/null || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  winebot-interactive:
    <<: *winebot_base
    profiles:
      - interactive
    environment:
      <<: *winebot_env
      MODE: interactive
      WINEBOT_RECORD: ${WINEBOT_RECORD:-1}
      WINEBOT_INSTANCE_CONTROL_MODE: ${WINEBOT_INSTANCE_CONTROL_MODE:-hybrid}
      WINEBOT_SESSION_CONTROL_MODE: ${WINEBOT_SESSION_CONTROL_MODE:-hybrid}
      ENABLE_VNC: "1"
      VNC_PASSWORD: ${VNC_PASSWORD:-winebot}
    ports:
      - "8000:8000"
      - "5354:5353/udp"
      - "5900:5900"
      - "6080:6080"
      - "${WINEDBG_PORT:-2345}:${WINEDBG_PORT:-2345}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "TOKENS=\"$$(cat /tmp/winebot_api_token 2>/dev/null || true) $$(cat /winebot-shared/winebot_api_token 2>/dev/null || true)\"; for TOKEN in $$TOKENS; do [ -z \"$$TOKEN\" ] && continue; curl -fsS -H \"X-API-Key: $$TOKEN\" http://127.0.0.1:8000/health >/dev/null && exit 0; done; curl -fsS http://127.0.0.1:8000/health >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  test-runner:
    build:
      context: ../
      dockerfile: tests/e2e/Dockerfile
    profiles:
      - test
    entrypoint: []
    depends_on:
      winebot-interactive:
        condition: service_healthy
    environment:
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - API_URL=http://winebot-interactive:8000
    volumes:
      - ..:/work
      - ../artifacts:/output
      - winebot-shared:/winebot-shared
    command: >
      bash -c "sleep 15 && /work/scripts/ci/test.sh && pytest -v -s /work/tests/e2e"

  lint-runner:
    build:
      context: ../
      dockerfile: tests/e2e/Dockerfile
    profiles:
      - lint
    entrypoint: []
    volumes:
      - ..:/work
    command: >
      /work/scripts/ci/lint.sh

  smoke-test:
    image: winebot:${WINEBOT_IMAGE_VERSION:-local}-${BUILD_INTENT:-rel}
    profiles:
      - test
    volumes:
      - ..:/work
      - wineprefix:/wineprefix
    command: ["/work/scripts/ci/smoke-test.sh"]

  # ── CV/OCR Sidecar (optional, built from docker/Dockerfile.cv-analyzer) ──
  winebot-cv:
    build:
      context: ../
      dockerfile: docker/Dockerfile.cv-analyzer
      args:
        WITH_YOLO: ${WITH_YOLO:-0}
        GIT_TOKEN: ${INFRA_GHCR_TOKEN:-}
    image: winebot-cv:${WINEBOT_IMAGE_VERSION:-local}
    profiles:
      - interactive
      - test
    ports:
      - "8001:8001"
      - "8080:8080"
    volumes:
      # Mount artifacts for offline batch analysis of session recordings
      - ../artifacts:/artifacts:ro
      # Mount demo output for batch CV analysis
      - ../demo/output:/demo-output:ro
      # Host model cache (persists YOLO weights across container rebuilds)
      - ../models/yolo:/models:ro
      # Host tessdata cache (persists Tesseract language data)
      - ../models/tessdata:/usr/share/tesseract-ocr/5/tessdata:ro
      # Host annotation cache (persists labels across container recreations)
      - ../models/annotations:/artifacts/annotations
    environment:
      YOLO_MODEL_PATH: /models/yolov8n.pt
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    command: ["--serve", "--host", "0.0.0.0", "--port", "8001"]

volumes:
  wineprefix:
  winebot-shared:
