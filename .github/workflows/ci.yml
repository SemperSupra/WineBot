name: CI

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'archive/**'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'archive/**'

permissions:
  contents: read

defaults:
  run:
    shell: bash -euo pipefail {0}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-flight:
    name: Pre-flight (Lint & Unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Verify capability matrix references
        run: python3 scripts/ci/verify-capability-matrix.py
      - name: Build lint runner
        run: docker compose -f compose/docker-compose.yml build lint-runner
      
      - name: Containerized Linting
        run: docker compose -f compose/docker-compose.yml --profile lint run --rm lint-runner scripts/ci/lint.sh

      - name: Containerized Unit Tests
        run: docker compose -f compose/docker-compose.yml --profile test --profile interactive run --rm test-runner scripts/ci/test.sh

      - name: Deterministic E2E subset
        run: |
          docker compose -f compose/docker-compose.yml --profile interactive --profile test run --rm test-runner \
            pytest -q /work/tests/e2e/test_dashboard_e2e.py /work/tests/e2e/test_ux_keyboard_accessibility.py

  integration:
    name: Integration (Smoke Test)
    needs: pre-flight
    uses: ./.github/workflows/reusable-build-smoke-gate.yml
    with:
      image_target: intent-slim
      build_intent: slim
      image_tag: winebot:slim
      smoke_phases: health
      run_rel_forbidden: true
      generate_trust_pack: true
      trust_pack_dir: artifacts/trust-pack
      trust_pack_artifact_name: trust-pack-ci
