{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.minio_container_name, "image") %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}

{% set perms_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% do c1.set_user(values.run_as.user, values.run_as.group) %}
{% do c1.healthcheck.set_custom_test(["CMD", "curl", "-f", "http://localhost:%d/minio/health/live" | format(values.network.api_port.port_number)]) %}

{# ── Network ──────────────────────────────────────────────────────────── #}
{% set proto = "https" if values.network.certificate_id else "http" %}

{# ── Environment ──────────────────────────────────────────────────────── #}
{% set envs = namespace(x={
  "MINIO_ROOT_USER": values.minio.root_user,
  "MINIO_ROOT_PASSWORD": values.minio.root_password,
}) %}

{% if values.network.certificate_id %}
  {% set cert = values.ix_certificates[values.network.certificate_id] %}
  {% do c1.configs.add("private", cert.privatekey, "/etc/minio/certs/private.key") %}
  {% do c1.configs.add("public", cert.certificate, "/etc/minio/certs/public.crt") %}
  {% do envs.x.update({"MINIO_SERVER_URL": "%s://%s:%d" | format(proto, values.network.domain, values.network.api_port.port_number)}) %}
  {% do envs.x.update({"MINIO_BROWSER_REDIRECT_URL": "%s://%s:%d" | format(proto, values.network.domain, values.network.console_port.port_number)}) %}
{% endif %}

{# ── Command ─────────────────────────────────────────────────────────── #}
{% set cmd = namespace(x=["server", "/data"]) %}

{% do cmd.x.append("--console-address") %}
{% do cmd.x.append(":%d" | format(values.network.console_port.port_number)) %}

{% if not values.network.certificate_id %}
  {% do cmd.x.append("--address") %}
  {% do cmd.x.append(":%d" | format(values.network.api_port.port_number)) %}
{% endif %}

{% for arg in values.minio.extra_args %}
  {% do cmd.x.append(arg) %}
{% endfor %}

{% do c1.set_command(cmd.x) %}

{# ── Apply environment ───────────────────────────────────────────────── #}
{% for key, value in envs.x.items() %}
  {% do c1.environment.add_env(key, value) %}
{% endfor %}
{% do c1.environment.add_user_envs(values.minio.additional_envs) %}

{# ── Ports ───────────────────────────────────────────────────────────── #}
{% do c1.add_port(values.network.console_port) %}
{% do c1.add_port(values.network.api_port) %}

{# ── Storage ─────────────────────────────────────────────────────────── #}
{% do c1.add_storage("/data", values.storage.export) %}
{% do perm_container.add_or_skip_action("export", values.storage.export, perms_config) %}

{% set tmp_config = {"type": "temporary", "volume_config": {"volume_name": "tmp"}} %}
{% do c1.add_storage("/tmp", tmp_config) %}
{% do perm_container.add_or_skip_action("tmp", tmp_config, perms_config) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perms_config) %}
{% endfor %}

{# ── Permissions container ──────────────────────────────────────────── #}
{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do c1.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{# ── Resource limits ────────────────────────────────────────────────── #}
{% do c1.set_cpu_limits(values.resources.limits.cpu) %}
{% do c1.set_memory_limits(values.resources.limits.memory) %}

{# ── Portal ──────────────────────────────────────────────────────────── #}
{% do tpl.portals.add(values.network.console_port, {"scheme": proto, "name": "MinIO Console"}) %}

{{ tpl.render() | tojson }}
