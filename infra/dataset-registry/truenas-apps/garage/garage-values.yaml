# ── Garage TrueNAS App — Pre-filled Values ─────────────────────────────────
# Use these values when installing Garage from the TrueNAS Web UI:
#   Apps → Available Apps → Garage → Install
#
# These are tuned for WineBot's dataset registry on truenas.fritz.box.
# ──────────────────────────────────────────────────────────────────────────────

# ── Garage Configuration ──────────────────────────────────────────────────────
garage:
  # Admin token for Garage management API (CHANGE THIS)
  admin_token: "CHANGE_ME_generate_a_strong_token"

  # S3 region (DVC uses this in endpoint config)
  region: "garage"

  # RPC secret: 64-character hex string
  # Generate: openssl rand -hex 32
  rpc_secret: "CHANGE_ME_generate_with_openssl_rand_hex_32"

  # Web UI auth
  enable_web_ui_auth: true
  web_ui_username: "admin"
  web_ui_password: "CHANGE_ME_web_ui_password"

  # Single-node deployment
  replication_factor: 1

  # No additional config options needed
  additional_options: []

  # No additional env vars needed
  additional_envs: []

# ── Timezone ──────────────────────────────────────────────────────────────────
TZ: "America/New_York"

# ── User / Group (TrueNAS defaults) ──────────────────────────────────────────
run_as:
  user: 568
  group: 568

# ── Network ────────────────────────────────────────────────────────────────────
network:
  # WebUI — access at http://truenas.fritz.box:30186
  web_port:
    bind_mode: "published"
    port_number: 30186

  # RPC port (inter-container, can stay exposed)
  rpc_port:
    bind_mode: "exposed"
    port_number: 30187

  # S3 API — DVC endpoint: http://truenas.fritz.box:30188
  s3_port:
    bind_mode: "published"
    port_number: 30188

  # S3 web (not needed, can stay exposed)
  s3_web_port:
    bind_mode: "exposed"
    port_number: 30189

  # Admin API — bucket/key management: http://truenas.fritz.box:30190
  admin_port:
    bind_mode: "published"
    port_number: 30190

  # No custom networks
  networks: []

# ── Storage ────────────────────────────────────────────────────────────────────
# All paths under /mnt/Storage/models/garage/
storage:
  # Config (small, ix_volume is fine or point to host path)
  config:
    type: "ix_volume"
    ix_volume_config:
      dataset_name: "garage-config"
      acl_enable: false

  # Metadata — Garage recommends fast (SSD/NVMe) storage
  metadata:
    type: "host_path"
    host_path_config:
      path: "/mnt/Storage/models/garage/meta"
      acl_enable: false

  # Data — main object storage
  data:
    type: "host_path"
    host_path_config:
      path: "/mnt/Storage/models/garage/data"
      acl_enable: false

  # Metadata snapshots
  metadata_snapshots:
    type: "host_path"
    host_path_config:
      path: "/mnt/Storage/models/garage/snapshots"
      acl_enable: false

  # No additional storage
  additional_storage: []

# ── Labels ─────────────────────────────────────────────────────────────────────
labels: []

# ── Resources ──────────────────────────────────────────────────────────────────
resources:
  limits:
    cpus: 2
    memory: 2048
