# ── MinIO Dataset Registry — TrueNAS App Definition ─────────────────────────
# This file defines the MinIO app for TrueNAS 24.10+ (Docker-based).
# Upload this via: Apps → Custom App → Install → Upload App Definition
# ──────────────────────────────────────────────────────────────────────────────

name: minio-dataset-registry
version: "1.0.0"
app_version: "latest"
description: >
  S3-compatible object storage for dataset versioning. Stores model weights,
  training data, checkpoints, and annotations. Used with DVC for version
  control and provenance tracking.

home: https://min.io
sources:
  - https://github.com/SemperSupra/WineBot/tree/main/infra/dataset-registry

maintainers:
  - name: WineBot
    email: mark@example.com

categories:
  - storage
  - data

# ── Docker Image ──────────────────────────────────────────────────────────────
image:
  repository: minio/minio
  tag: latest
  pull_policy: IfNotPresent

# ── Ports ─────────────────────────────────────────────────────────────────────
ports:
  - name: S3 API
    container_port: 9000
    node_port: 9000
    protocol: TCP
    description: S3-compatible object storage API

  - name: Console
    container_port: 9001
    node_port: 9001
    protocol: TCP
    description: MinIO web management console

# ── Storage ───────────────────────────────────────────────────────────────────
storage:
  - name: data
    description: MinIO data directory
    host_path: /mnt/Storage/models/minio
    mount_path: /data
    type: host_path

# ── Environment ───────────────────────────────────────────────────────────────
environment_variables:
  - name: MINIO_ROOT_USER
    label: Root Username
    description: MinIO admin username
    type: string
    default: winebot
    required: true

  - name: MINIO_ROOT_PASSWORD
    label: Root Password
    description: MinIO admin password (min 8 characters)
    type: password
    default: ""
    required: true

# ── Command ───────────────────────────────────────────────────────────────────
command:
  - server
  - /data

arguments:
  - --console-address
  - ":9001"
