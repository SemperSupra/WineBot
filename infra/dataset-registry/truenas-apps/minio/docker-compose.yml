# ── MinIO Dataset Registry — Docker Compose ──────────────────────────────────
# For TrueNAS 24.10+ (Docker-based), deploy via:
#   Apps → Custom App → Copy & Paste this YAML
# Or from CLI:
#   docker compose -f infra/dataset-registry/truenas-apps/minio/docker-compose.yml up -d
# ──────────────────────────────────────────────────────────────────────────────

version: "3.8"

services:
  minio:
    image: minio/minio:latest
    container_name: minio-dataset-registry
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - /mnt/Storage/models/minio:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-winebot}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Required}
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
