[build-system]
requires = ["setuptools>=75", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "desktop-ui-cv"
version = "0.1.0"
description = "Desktop UI element detection, OCR, state classification, and synthetic dataset generation"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.12"
authors = [
    {name = "Mark E. DeYoung"},
]
keywords = ["computer-vision", "object-detection", "ocr", "desktop-automation", "rpa"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering :: Image Recognition",
]

dependencies = [
    "opencv-python-headless>=4.9",
    "numpy>=2.0",
    "Pillow>=10.0",
]

[project.optional-dependencies]
gpu = [
    "torch>=2.12",
    "torchvision>=0.27",
    "ultralytics>=8.4",
]
ocr = [
    "pytesseract>=0.3",
    "onnxruntime>=1.17",
    "packaging>=21.0",
]
server = [
    "fastapi>=0.129",
    "uvicorn>=0.41",
]
clip = [
    "open-clip-torch>=2.24",
    "faiss-cpu>=1.8",
]
dev = [
    "pytest>=8.0",
    "ruff>=0.5",
]
all = [
    "desktop-ui-cv[gpu,ocr,server,clip,dev]",
]

[project.urls]
Homepage = "https://github.com/SemperSupra/WineBot"
Source = "https://github.com/SemperSupra/WineBot/tree/main/packages/desktop-ui-cv"
Documentation = "https://github.com/SemperSupra/WineBot/blob/main/packages/desktop-ui-cv/README.md"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"winebot_cv" = ["py.typed"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.pytest.ini_options]
testpaths = ["tests"]
